<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5.5' fill='%233b6ef5'/%3E%3Cpath d='M4.5 5.5h1.9l1.8 8.4a1.55 1.55 0 0 0 1.51 1.23h6.06a1.55 1.55 0 0 0 1.5-1.16L19 8.4H7' stroke='%23fff' stroke-width='1.7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M10 10.8l1.7 1.7 3-3.2' stroke='%23fff' stroke-width='1.7' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='10.2' cy='18.4' r='1.3' fill='%23fff'/%3E%3Ccircle cx='15.8' cy='18.4' r='1.3' fill='%23fff'/%3E%3C/svg%3E">
<title>ReturnGuard — My Complaints</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ui/app.css">
<style>
  .case{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff}
  .case + .case{margin-top:12px}
  .replybox{display:flex;gap:8px;margin-top:11px}
  .replybox input{flex:1}
  .kv{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.6}
  .kv b{color:var(--ink)}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-brand"><div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 5h2.1l2 9.3a1.7 1.7 0 0 0 1.66 1.35h6.7a1.7 1.7 0 0 0 1.65-1.28L20 8.2H7.1" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.6 10.9l1.9 1.9 3.3-3.6" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10.7" cy="19.3" r="1.45" fill="#fff"/><circle cx="16.9" cy="19.3" r="1.45" fill="#fff"/></svg></div><div><div class="nm">ReturnGuard</div><span class="sub">Representative</span></div></div>
    <div class="sb-sec">Workspace</div>
    <nav class="sb-nav">
      <a class="on"><span class="msym">assignment_ind</span> My complaints <span class="sb-badge" id="qN" style="display:none">0</span></a>
    </nav>
    <div class="sb-foot">
      <nav class="sb-nav">
        <a id="availBtn" onclick="toggleAvail()"><span class="msym">toggle_on</span> <span id="availTxt">Available</span></a>
        <a onclick="logout()"><span class="msym">logout</span> Log out</a>
      </nav>
      <div class="sb-user"><div class="av" id="sbAv">·</div><div><div class="nm" id="sbNm">…</div><div class="rl" id="sbCo"></div></div></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div><h1>My complaints</h1><div class="sub">Cases assigned to you — reply lands in the customer's chat</div></div>
    </div>
    <div class="content"><div id="queue"><div class="skel"></div></div></div>
  </main>
</div>

<script>
const $=s=>document.querySelector(s);
const api=(u,o)=>fetch(u,o).then(r=>{ if(!r.ok) throw r; return r.json(); });
const P=(u,b)=>api(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
let REP=null, available=true;
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function boot(){
  const rid=new URLSearchParams(location.search).get('rep');
  const companies=await api('/api/companies');
  let found=null, coName='';
  for(const c of companies){
    const rr=await api(`/api/companies/${c.id}/reps`).catch(()=>[]);
    const hit=rr.find(x=>x.id===rid) || (!rid && rr[0]);
    if(hit){ found=hit; coName=c.name; break; }
  }
  if(!found){ location.href='/login'; return; }
  REP=found; available=REP.available;
  $('#sbNm').textContent=REP.name; $('#sbCo').textContent=coName;
  $('#sbAv').textContent=REP.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  renderAvail(); loadQueue();
}
function renderAvail(){
  $('#availTxt').textContent=available?'Available':'Off duty';
  $('#availBtn').querySelector('.msym').textContent=available?'toggle_on':'toggle_off';
}
async function toggleAvail(){
  available=!available; renderAvail();
  await P(`/api/reps/${REP.id}/availability`,{available});
}
async function loadQueue(){
  const q=await api(`/api/reps/${REP.id}/queue`).catch(()=>[]);
  $('#qN').style.display=q.length?'':'none'; $('#qN').textContent=q.length;
  $('#queue').innerHTML=q.length?q.map(r=>{
    const pa=r.proposed_action||{}; const ev=r.evidence||{};
    const evtxt=ev.verdict?`Evidence <b style="color:${ev.verdict==='supports'?'var(--green)':'var(--red)'}">${ev.verdict}</b> (${Number(ev.confidence||0).toFixed(2)})`:'No evidence provided';
    const pol=(r.policy_citations&&r.policy_citations.length)?`<br><b>Policy basis:</b> ${esc(r.policy_citations[0].text.slice(0,120))}…`:'';
    return `<div class="case">
      <div class="flex between"><div>
        <div class="b">${esc(r.customer_id)} · ${esc(r.title||'—')}</div>
        <div class="tiny muted">${esc((r.reason||'review').replace(/_/g,' '))} · ${esc((r.issue_type||'—').replace(/_/g,' '))}</div></div>
        <span class="pill amber">${esc((pa.action_type||'needs decision').replace(/_/g,' '))}${pa.amount?(' ₹'+Number(pa.amount).toFixed(0)):''}</span></div>
      <div class="kv">${evtxt}${pol}</div>
      <div class="replybox"><input class="input" id="rp-${r.id}" autocomplete="off" placeholder="Reply to the customer…">
        <button class="btn" onclick="reply('${r.id}')">Send</button></div>
      <div class="flex mt-s wrap">
        <button class="btn btn-green btn-sm" onclick="decide('${r.id}','approve')"><span class="msym">check</span> Approve</button>
        <button class="btn btn-sm" onclick="decide('${r.id}','deny')">Deny</button>
        <button class="btn btn-danger btn-sm" onclick="decide('${r.id}','deny',true)">Deny · fraud</button>
      </div></div>`;
  }).join('')
  :'<div class="card"><div class="card-b"><div class="empty"><span class="msym">task_alt</span><h4>No complaints assigned</h4><div class="muted tiny">When your team lead assigns you a case, it appears here.</div></div></div></div>';
}
async function reply(sid){
  const inp=$('#rp-'+sid); const text=(inp.value||'').trim(); if(!text) return;
  await P(`/api/sessions/${sid}/reply`,{reviewer_id:REP.id,text});
  inp.value=''; inp.placeholder='Sent ✓ — visible in the customer chat';
}
async function decide(sid,decision,fraud){
  await P(`/api/sessions/${sid}/review`,{decision,reviewer_id:REP.id,fraud:!!fraud});
  loadQueue();
}
async function logout(){ await P('/api/auth/logout'); location.href='/login'; }
boot();
setInterval(()=>{ const a=document.activeElement;
  if(a && document.getElementById('queue').contains(a)) return; loadQueue(); }, 8000);
</script>
</body>
</html>
