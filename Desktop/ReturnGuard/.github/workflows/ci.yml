name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: stub          # deterministic, offline — no API key needed
      EMBEDDING_PROVIDER: stub
      AS_OF_DATE: "2026-06-22"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Unit + safety tests
        run: pytest -q -m "unit or safety"

      - name: Integration tests
        run: pytest -q -m "integration"

      - name: Evaluation harness (hard gates)
        run: python -m eval.runner
