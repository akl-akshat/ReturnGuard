# ReturnGuard backing services: Postgres(+pgvector) and a single-broker Kafka (KRaft).
# Langfuse (tracing) is optional and lives behind the `observability` profile so the
# core stack stays lean:  `docker compose up -d`  brings up just postgres + kafka.
#   with tracing:  `docker compose --profile observability up -d`
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rg-postgres
    environment:
      POSTGRES_USER: returnguard
      POSTGRES_PASSWORD: returnguard
      POSTGRES_DB: returnguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U returnguard -d returnguard"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: rg-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node combined broker+controller (no ZooKeeper).
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Optional self-hosted tracing — enable with: --profile observability
  langfuse:
    image: langfuse/langfuse:2
    container_name: rg-langfuse
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://returnguard:returnguard@postgres:5432/returnguard
      NEXTAUTH_SECRET: dev-not-a-secret
      SALT: dev-salt
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"

volumes:
  pgdata:
  kafkadata:
